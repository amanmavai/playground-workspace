<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/build/tailwind.css" />
  </head>
  <body class="bg-yellow-100">
    <!-- Full width column -->
    <div class="flex mb-4">
      <div class="w-full bg-gray-500 h-12"></div>
    </div>

    <!-- Two columns -->
    <div class="flex mb-4">
      <div class="w-1/2 bg-gray-400 h-12"></div>
      <div class="w-1/2 bg-gray-500 h-12"></div>
    </div>

    <!-- Three columns -->
    <div class="flex mb-4">
      <div class="w-1/3 bg-gray-400 h-12"></div>
      <div class="w-1/3 bg-gray-500 h-12"></div>
      <div class="w-1/3 bg-gray-400 h-12"></div>
    </div>

    <!-- Four columns -->
    <div class="flex mb-4">
      <div class="w-1/4 bg-gray-500 h-12"></div>
      <div class="w-1/4 bg-gray-400 h-12"></div>
      <div class="w-1/4 bg-gray-500 h-12"></div>
      <div class="w-1/4 bg-gray-400 h-12"></div>
    </div>

    <!-- Five columns -->
    <div class="flex mb-4">
      <div class="w-1/5 bg-gray-500 h-12"></div>
      <div class="w-1/5 bg-gray-400 h-12"></div>
      <div class="w-1/5 bg-gray-500 h-12"></div>
      <div class="w-1/5 bg-gray-400 h-12"></div>
      <div class="w-1/5 bg-gray-500 h-12"></div>
    </div>

    <!-- Six columns -->
    <div class="flex">
      <div class="w-1/6 bg-gray-400 h-12"></div>
      <div class="w-1/6 bg-gray-500 h-12"></div>
      <div class="w-1/6 bg-gray-400 h-12"></div>
      <div class="w-1/6 bg-gray-500 h-12"></div>
      <div class="w-1/6 bg-gray-400 h-12"></div>
      <div class="w-1/6 bg-gray-500 h-12"></div>
    </div>

    <!-- Responsive Grids -->
    <div class="flex flex-wrap pt-6">
      <div class="h-12 w-full sm:w-1/2 md:w-1/3 lg:w-1/4 xl:w-1/6 mb-4 bg-blue-500"></div>
      <div class="h-12 w-full sm:w-1/2 md:w-1/3 lg:w-1/4 xl:w-1/6 mb-4 bg-blue-400"></div>
      <div class="h-12 w-full sm:w-1/2 md:w-1/3 lg:w-1/4 xl:w-1/6 mb-4 bg-blue-500"></div>
      <div class="h-12 w-full sm:w-1/2 md:w-1/3 lg:w-1/4 xl:w-1/6 mb-4 bg-blue-400"></div>
      <div class="h-12 w-full sm:w-1/2 md:w-1/3 lg:w-1/2 xl:w-1/6 mb-4 bg-blue-500"></div>
      <div class="h-12 w-full sm:w-1/2 md:w-1/3 lg:w-1/2 xl:w-1/6 mb-4 bg-blue-400"></div>
    </div>

    <!-- Use flex-1 instead of an explicit width on your columns to have them size automatically to fill the row. -->
    <!-- Full width column -->
    <div class="flex mb-4">
      <div class="flex-1 bg-orange-500 h-12"></div>
    </div>

    <!-- Five columns -->
    <div class="flex mb-4">
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
    </div>

    <!-- Seven columns -->
    <div class="flex mb-4">
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
    </div>

    <!-- Eleven columns -->
    <div class="flex mb-4">
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
      <div class="flex-1 bg-orange-500 h-12"></div>
      <div class="flex-1 bg-orange-400 h-12"></div>
    </div>
  </body>
</html>
